<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥞 PancakeSwap Prediction Signal</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #e6edf3; --dim: #8b949e; --green: #3fb950;
    --red: #f85149; --yellow: #d29922; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; min-height: 100vh; }

  .header {
    text-align: center; padding: 24px 16px 8px;
    background: linear-gradient(135deg, #1a1e2e 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 28px; margin-bottom: 4px; font-weight: 800;
    background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0077ff, #8800ff, #ff00ff, #ff0000);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbow 3s linear infinite;
  }
  @keyframes rainbow { 0%{background-position:0% center} 100%{background-position:200% center} }
  .header .sub { color: var(--dim); font-size: 12px; }

  .status-bar {
    display: flex; justify-content: center; gap: 24px; padding: 12px;
    background: var(--card); border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .status-bar .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot-live { background: var(--green); animation: pulse 2s infinite; }
  .dot-stale { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes flash { 0% { box-shadow: 0 0 0 0 rgba(88,166,255,0.5); } 100% { box-shadow: 0 0 0 0 transparent; } }
  .flash-update { animation: flash 1s ease-out; }

  .signal-card {
    max-width: 480px; margin: 16px auto; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  .signal-header {
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .signal-direction {
    font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 8px;
  }
  .signal-direction.bull { color: var(--green); }
  .signal-direction.bear { color: var(--red); }
  .signal-direction.skip { color: var(--dim); }
  .signal-confidence {
    font-size: 14px; padding: 4px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.06); color: var(--dim);
  }

  .pool-bar {
    padding: 12px 20px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .pool-bar .bar-track {
    flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .pool-bar .bar-fill-bull { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s; }
  .pool-bar .bar-fill-bear { height: 100%; background: var(--red); border-radius: 3px; transition: width 0.5s; }
  .pool-pct { min-width: 40px; text-align: right; font-size: 12px; }

  .trend-bar {
    padding: 8px 20px; font-size: 12px; text-align: center;
    background: rgba(255,255,255,0.02); color: var(--dim);
    border-bottom: 1px solid var(--border);
  }
  .trend-bar.active { background: rgba(248,81,73,0.08); color: var(--yellow); }

  .wallet-section {
    max-width: 480px; margin: 12px auto; padding: 0 16px;
  }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    text-align: center;
  }
  .btn-wallet {
    background: var(--card); color: var(--text);
  }
  .btn-wallet:hover { border-color: var(--blue); }
  .btn-wallet.connected { border-color: var(--green); color: var(--green); }
  .btn-bet {
    background: var(--card); color: var(--dim);
  }
  .btn-bet:hover:not(:disabled) { border-color: var(--yellow); color: var(--yellow); }
  .btn-bet.ready { border-color: var(--green); color: var(--green); background: rgba(63,185,80,0.08); }
  .btn-bet:disabled { opacity: 0.4; cursor: default; }

  .wallet-info {
    display: none; margin-top: 8px; padding: 10px 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--dim);
    justify-content: space-between; align-items: center;
  }
  .wallet-info.show { display: flex; }
  .wallet-addr { color: var(--text); font-weight: 600; }
  .wallet-bnb { color: var(--yellow); font-weight: 700; }

  .bet-status {
    display: none; margin-top: 8px; padding: 8px 14px;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 8px; font-size: 12px; color: var(--dim); text-align: center;
  }
  .bet-status.show { display: block; }
  .bet-status.countdown { color: var(--yellow); border-color: var(--yellow); }
  .bet-status.betting { color: var(--blue); border-color: var(--blue); }
  .bet-status.success { color: var(--green); border-color: var(--green); }
  .bet-status.error { color: var(--red); border-color: var(--red); }

  .signals-grid { padding: 12px 20px; }
  .signal-row {
    display: flex; align-items: center; padding: 10px 0;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .signal-row:last-child { border-bottom: none; }
  .signal-header-row {
    display: flex; align-items: center; padding: 0 4px 8px;
    font-size: 14px; color: var(--dim);
  }
  .signal-header-row .h-icon { width: 28px; text-align: center; }
  .signal-header-row .h-name { width: 50px; }
  .signal-header-row .h-dot { width: 10px; margin: 0 8px; }
  .signal-header-row .h-score { width: 36px; text-align: right; }
  .signal-header-row .h-weight { width: 32px; text-align: right; }
  .signal-header-row .h-detail { flex: 1; text-align: right; margin-left: 8px; }
  .signal-icon { font-size: 18px; width: 28px; text-align: center; }
  .signal-name { width: 50px; font-size: 13px; color: var(--dim); }
  .signal-sub { font-size: 10px; color: rgba(139,148,158,0.6); margin-top: 1px; }
  .signal-dot { width: 10px; height: 10px; border-radius: 50%; margin: 0 8px; }
  .dot-bull { background: var(--green); }
  .dot-bear { background: var(--red); }
  .dot-neutral { background: var(--dim); }
  .signal-score { width: 36px; text-align: right; font-size: 13px; font-weight: 600; }
  .signal-weight { width: 32px; text-align: right; font-size: 11px; color: rgba(139,148,158,0.5); }
  .signal-detail { flex: 1; font-size: 11px; color: var(--dim); text-align: right; margin-left: 8px; }


  .history-item {
    display: flex; align-items: center; padding: 8px 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 6px; font-size: 12px;
  }
  .history-epoch { width: 70px; color: var(--dim); }
  .history-dir { width: 50px; font-weight: 600; }
  .history-dir.bull { color: var(--green); }
  .history-dir.bear { color: var(--red); }
  .history-conf { width: 40px; text-align: right; }
  .history-actual { width: 50px; font-weight: 600; }
  .history-actual.bull { color: var(--green); }
  .history-actual.bear { color: var(--red); }
  .history-match { width: 20px; text-align: center; font-size: 14px; margin-left: 4px; }
  .history-outcome { width: 56px; text-align: center; font-size: 12px; }
  .history-result { margin-left: auto; font-size: 14px; }
  .history-time { color: var(--dim); margin-left: 8px; font-size: 11px; }

  .tracking { max-width: 480px; margin: 16px auto; padding: 0 16px 32px; }
  .tracking h3 { font-size: 14px; color: var(--dim); margin-bottom: 8px; padding: 0 4px; }
  .tracking-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; text-align: center;
  }
  .stat-card .label { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
  .stat-card .value { font-size: 20px; font-weight: 700; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }

  .pagination {
    display: flex; justify-content: center; align-items: center;
    gap: 6px; margin-top: 10px; padding: 8px 4px;
    background: #0d1117; border-radius: 8px;
  }
  .pagination button {
    background: #161b22; border: 1px solid #30363d; color: #8b949e;
    padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: inherit;
  }
  .pagination button:hover { border-color: #58a6ff; color: #58a6ff; }
  .pagination button.active { background: #58a6ff; border-color: #58a6ff; color: #fff; }
  .pagination button:disabled { opacity: 0.3; cursor: default; }
  .pagination .page-info { color: #8b949e; font-size: 11px; margin: 0 4px; }

  .history { max-width: 480px; margin: 16px auto; padding: 0 16px; }
  .history h3 { font-size: 14px; color: var(--dim); margin-bottom: 8px; padding: 0 4px; }
  .history table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history th { text-align: left; padding: 6px 4px; color: var(--dim); font-weight: 600; font-size: 11px; border-bottom: 1px solid var(--border); }
  .history td { padding: 7px 4px; border-bottom: 1px solid rgba(48,54,61,0.4); }
  .history .col-epoch { width: 58px; color: var(--dim); }
  .history .col-dir { width: 40px; font-weight: 600; }
  .history .col-arrow { width: 18px; text-align: center; color: var(--dim); }
  .history .col-actual { width: 44px; font-weight: 600; }
  .history .col-conf { width: 34px; text-align: right; }
  .history .col-result { width: 48px; text-align: center; }
  .history .col-time { text-align: right; color: var(--dim); }
  .bull { color: var(--green); }
  .bear { color: var(--red); }

  .footer { text-align: center; padding: 16px; color: var(--dim); font-size: 11px; }

  @media (max-width: 520px) {
    .signal-card, .history, .tracking { margin-left: 8px; margin-right: 8px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span style="-webkit-text-fill-color:initial">🎰</span> BNB百家乐</h1>
  <div class="sub">实时信号看板 · 每5分钟一轮</div>
  <div class="sub" style="margin-top:6px">给我BNB我不要 &nbsp;|&nbsp; <a href="https://docs.pancakeswap.finance/play/prediction" style="color:var(--blue);text-decoration:none" target="_blank">📖 BNB百家乐Wiki</a> &nbsp;|&nbsp; <a href="https://github.com/HKUDS/Vibe-Trading" style="color:var(--blue);text-decoration:none" target="_blank">🎓 港大 Vibe-Trading</a></div>
</div>

<div class="status-bar">
  <span><span class="dot dot-live" id="live-dot"></span><span id="live-text">连接中...</span></span>
  <span id="update-time">--</span>
</div>

<div class="wallet-section">
  <div class="btn-row">
    <button class="btn btn-wallet" id="btn-wallet" onclick="connectWallet()">🔗 连接钱包</button>
    <button class="btn btn-bet" id="btn-bet" onclick="toggleAutoBet()" disabled>🎯 自动下注</button>
  </div>
  <div class="wallet-info" id="wallet-info">
    <span><span class="wallet-addr" id="wallet-addr"></span></span>
    <span>BNB: <span class="wallet-bnb" id="wallet-bnb">--</span></span>
  </div>
  <div class="bet-status" id="bet-status"></div>
</div>

<div class="signal-card" id="signal-card">
  <div class="signal-header">
    <div class="signal-direction skip" id="signal-dir">等待数据...</div>
    <div class="signal-confidence" id="signal-epoch">--</div>
  </div>
  <div class="pool-bar">
    <span style="color:var(--green)">BULL</span>
    <div class="bar-track"><div class="bar-fill-bull" id="bull-bar" style="width:50%"></div></div>
    <span class="pool-pct" id="bull-pct">50%</span>
    <span class="pool-pct" id="bear-pct" style="color:var(--red)">50%</span>
    <div class="bar-track"><div class="bar-fill-bear" id="bear-bar" style="width:50%"></div></div>
    <span style="color:var(--red)">BEAR</span>
  </div>
  <div class="pool-bar" style="font-size:12px; color:var(--dim)">
    池子: <span id="pool-total">0.00</span> BNB &nbsp;|&nbsp; 赔率 B:<span id="odds-bull">--</span>x R:<span id="odds-bear">--</span>x
  </div>
  <div class="trend-bar" id="trend-bar">⚠️ <span id="trend-text"></span></div>
  <div class="signals-grid" id="signals-grid"></div>
</div>

<div class="history">
  <h3>📜 近期信号</h3>
  <table>
    <thead><tr>
      <th class="col-epoch">期号</th>
      <th class="col-dir">预测</th>
      <th class="col-arrow"></th>
      <th class="col-actual">实际</th>
      <th class="col-conf" style="text-align:right">信心</th>
      <th class="col-result">结果</th>
      <th class="col-time">时间</th>
    </tr></thead>
    <tbody id="history-tbody"></tbody>
  </table>
  <div id="pagination"></div>
</div>

<div class="tracking">
  <h3>📊 胜率统计</h3>
  <div class="tracking-stats" id="tracking-stats"></div>
</div>

<div class="footer">
  一乐爸爸 · hermes agent + mimo v2 pro 强势搭建 · <span id="refresh-count">0</span> 次刷新
</div>

<script>
const DATA_URL = './signals.json';
const REFRESH_MS = 10000;
let refreshCount = 0;
let lastEpoch = 0;

function dotClass(d) {
  return d === 'BULL' ? 'dot-bull' : d === 'BEAR' ? 'dot-bear' : 'dot-neutral';
}
function dirClass(d) {
  return d === 'BULL' ? 'bull' : d === 'BEAR' ? 'bear' : 'skip';
}

function renderSignal(sig) {
  if (!sig) return;
  const dirEl = document.getElementById('signal-dir');
  const icon = sig.direction === 'BULL' ? '🟢 BULL' : sig.direction === 'BEAR' ? '🔴 BEAR' : '⚪ SKIP';
  dirEl.textContent = icon;
  dirEl.className = 'signal-direction ' + dirClass(sig.direction);
  document.getElementById('signal-epoch').textContent = `最新期号 ${sig.epoch} · 信心 ${Math.round(sig.confidence)}`;

  const total = sig.pool_total || 0;
  const bullPct = total > 0 ? (sig.pool_bull / total * 100) : 50;
  const bearPct = total > 0 ? (sig.pool_bear / total * 100) : 50;
  document.getElementById('bull-bar').style.width = bullPct + '%';
  document.getElementById('bear-bar').style.width = bearPct + '%';
  document.getElementById('bull-pct').textContent = bullPct.toFixed(0) + '%';
  document.getElementById('bear-pct').textContent = bearPct.toFixed(0) + '%';
  document.getElementById('pool-total').textContent = total.toFixed(2);
  document.getElementById('odds-bull').textContent = bullPct > 0 ? (100/bullPct).toFixed(1) : '--';
  document.getElementById('odds-bear').textContent = bearPct > 0 ? (100/bearPct).toFixed(1) : '--';

  // Trend detection display — always visible
  const trendBar = document.getElementById('trend-bar');
  const trendText = document.getElementById('trend-text');
  if (sig.trend) {
    trendText.textContent = '⚠️ ' + sig.trend;
    trendBar.classList.add('active');
  } else {
    trendText.textContent = '趋势: 正常';
    trendBar.classList.remove('active');
  }

  const grid = document.getElementById('signals-grid');
  grid.innerHTML = '';

  // 表头
  const hdr = document.createElement('div');
  hdr.className = 'signal-header-row';
  hdr.innerHTML = '<span class="h-icon"></span><span class="h-name">指标</span><span class="h-dot"></span><span class="h-score">分值</span><span class="h-weight">权重</span><span class="h-detail">实时数据</span>';
  grid.appendChild(hdr);

  const icons = { Time: '⏰', Pool: '🏊', Mom: '📈', Liq: '💥', FR: '💰' };
  const subs = { Pool: '赔率偏差', FR: '资金费率', Mom: 'RSI+EMA', Liq: '多空比', Time: '时段偏差' };
  const weights = { Pool: '40%', FR: '20%', Mom: '15%', Liq: '15%', Time: '10%' };
  for (const s of sig.signals || []) {
    const row = document.createElement('div');
    row.className = 'signal-row';
    row.innerHTML = `
      <span class="signal-icon">${icons[s.name] || '📊'}</span>
      <span class="signal-name">${s.name}<div class="signal-sub">${subs[s.name] || ''}</div></span>
      <span class="signal-dot ${dotClass(s.direction)}"></span>
      <span class="signal-score">${s.score}</span>
      <span class="signal-weight">${weights[s.name] || ''}</span>
      <span class="signal-detail">${s.info || ''}</span>
    `;
    grid.appendChild(row);
  }

  // Sound + flash on new epoch
  if (sig.epoch !== lastEpoch && lastEpoch > 0) {
    try { new Audio('data:audio/wav;base64,UklGRl9vT19LYXZPAEVSAAAABAAQAAEAQB8AAAB9AAACABAAZGF0YQ==').play().catch(()=>{}); } catch(e){}
    const card = document.getElementById('signal-card');
    card.classList.remove('flash-update');
    void card.offsetWidth; // reflow
    card.classList.add('flash-update');
  }
  lastEpoch = sig.epoch;
}

let currentHistory = [];
let currentPage = 1;
const PAGE_SIZE = 10;

function renderHistory(history) {
  currentHistory = (history || []).slice().reverse();
  renderHistoryPage();
}

function renderHistoryPage() {
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = '';
  const total = currentHistory.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = currentHistory.slice(start, start + PAGE_SIZE);

  for (const h of pageItems) {
    const actualDir = h.result || '--';
    const predCls = h.direction === 'BULL' ? 'bull' : h.direction === 'BEAR' ? 'bear' : '';
    const actCls = actualDir === 'BULL' ? 'bull' : actualDir === 'BEAR' ? 'bear' : '';
    const outcome = h.outcome === 'WIN' ? '✅' : h.outcome === 'LOSS' ? '❌' : h.outcome === 'TIE' ? '➖' : '⏳';
    const trendTag = h.trend ? ' <span style="font-size:10px;color:var(--yellow)" title="' + h.trend + '">⚠️</span>' : '';
    const tr = document.createElement('tr');
    tr.innerHTML = '<td class="col-epoch">#' + h.epoch + '</td>' +
      '<td class="col-dir ' + predCls + '">' + (h.direction || '--') + trendTag + '</td>' +
      '<td class="col-arrow">→</td>' +
      '<td class="col-actual ' + actCls + '">' + actualDir + '</td>' +
      '<td class="col-conf">' + (h.confidence ? Math.round(h.confidence) : '--') + '</td>' +
      '<td class="col-result">' + outcome + '</td>' +
      '<td class="col-time">' + (h.time || '') + '</td>';
    tbody.appendChild(tr);
  }
  renderPagination(totalPages, total);
}

function renderPagination(totalPages, total) {
  let el = document.getElementById('pagination');
  if (!el) {
    el = document.createElement('div');
    el.id = 'pagination';
    el.className = 'pagination';
    document.querySelector('.history').appendChild(el);
  }
  el.innerHTML = '';

  const prev = document.createElement('button');
  prev.textContent = '‹ 上一页';
  prev.disabled = currentPage <= 1;
  prev.onclick = () => { currentPage--; renderHistoryPage(); };
  el.appendChild(prev);

  for (let p = 1; p <= totalPages; p++) {
    const btn = document.createElement('button');
    btn.textContent = p;
    btn.className = p === currentPage ? 'active' : '';
    btn.onclick = ((pg) => () => { currentPage = pg; renderHistoryPage(); })(p);
    el.appendChild(btn);
  }

  const next = document.createElement('button');
  next.textContent = '下一页 ›';
  next.disabled = currentPage >= totalPages;
  next.onclick = () => { currentPage++; renderHistoryPage(); };
  el.appendChild(next);

  // Show current page range indicator
  const rangeStart = Math.floor((currentPage - 1) / 10) * 10 + 1;
  const rangeEnd = Math.min(rangeStart + 9, totalPages);
  const info = document.createElement('span');
  info.className = 'page-info';
  info.textContent = `共${totalPages}页，第${rangeStart}-${rangeEnd}页`;
  el.appendChild(info);
}

function renderTracking(t) {
  const el = document.getElementById('tracking-stats');
  const hist = currentHistory || [];

  // Use tracking data for overall stats (covers all rounds, not just last 100)
  const totalWins = (t && t.wins != null) ? t.wins : 0;
  const totalLosses = (t && t.losses != null) ? t.losses : 0;
  const totalAll = totalWins + totalLosses;
  const wr = totalAll > 0 ? (totalWins / totalAll * 100).toFixed(1) : '0.0';

  // Recent 20 from history
  const recent20 = hist.slice(-20);
  let r20w = 0, r20l = 0;
  for (const h of recent20) {
    if (h.outcome === 'WIN') r20w++;
    else if (h.outcome === 'LOSS') r20l++;
  }
  const r20total = r20w + r20l;
  const r20wr = r20total > 0 ? (r20w / r20total * 100).toFixed(1) : '0.0';

  // Time signal stats from backend
  const timeTotal = (t && t.time_wins != null) ? (t.time_wins||0) + (t.time_losses||0) : 0;
  const timeWr = timeTotal > 0 ? ((t.time_wins||0) / timeTotal * 100).toFixed(1) : '0.0';

  let html = `
    <div class="stat-card"><div class="label">全部轮胜率</div><div class="value ${parseFloat(wr)>=50?'green':'red'}">${wr}%</div></div>
    <div class="stat-card"><div class="label">近20轮胜率</div><div class="value ${parseFloat(r20wr)>=50?'green':'red'}">${r20wr}%</div></div>
    <div class="stat-card"><div class="label">胜 / 负</div><div class="value">${totalWins} / ${totalLosses}</div></div>
  `;
  if (timeTotal > 0) {
    html += `<div class="stat-card"><div class="label">Time信号</div><div class="value ${parseFloat(timeWr)>=50?'green':'red'}">${timeWr}% (${t.time_wins}/${t.time_losses})</div></div>`;
  }
  el.innerHTML = html;
}

async function fetchData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    window._signalData = data;
    document.getElementById('live-dot').className = 'dot dot-live';
    document.getElementById('live-text').textContent = '实时';
    // clock ticks every second via setInterval below
    renderSignal(data.current);
    renderHistory(data.history);
    renderTracking(data.tracking);
  } catch (e) {
    document.getElementById('live-dot').className = 'dot dot-stale';
    document.getElementById('live-text').textContent = '连接失败';
  }
  refreshCount++;
  document.getElementById('refresh-count').textContent = refreshCount;
}

// Live clock ticking every second
let clockInterval;
function startClock() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }, 1000);
}
startClock();
fetchData();
setInterval(fetchData, REFRESH_MS);

// ─── MetaMask + Auto Bet ───
const PREDICTION_ADDR = '0x18B2A687610328590Bc8F2e5fEdDe3b582A49cdA';
const PREDICTION_ABI = [
  'function betBull(uint256 epoch) payable',
  'function betBear(uint256 epoch) payable',
  'function claimable(uint256 epoch, address user) view returns (bool)',
];
const BET_BEFORE_LOCK = 30; // seconds before lock to trigger bet
const BNB_CHAIN_ID = '0x38'; // 56

let walletAddress = null;
let autoBetEnabled = false;
let betCountdownTimer = null;
let lastBetEpoch = 0;

function shortAddr(addr) {
  return addr.slice(0, 6) + '...' + addr.slice(-4);
}

async function connectWallet() {
  if (!window.ethereum) {
    alert('请安装 MetaMask 钱包');
    return;
  }
  try {
    // Switch to BSC
    try {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BNB_CHAIN_ID }] });
    } catch (switchError) {
      if (switchError.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: BNB_CHAIN_ID, chainName: 'BNB Smart Chain',
            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
            rpcUrls: ['https://bsc-dataseed.binance.org/'],
            blockExplorerUrls: ['https://bscscan.com/']
          }]
        });
      }
    }
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    walletAddress = accounts[0];
    document.getElementById('btn-wallet').textContent = '✅ ' + shortAddr(walletAddress);
    document.getElementById('btn-wallet').classList.add('connected');
    document.getElementById('wallet-addr').textContent = shortAddr(walletAddress);
    document.getElementById('wallet-info').classList.add('show');
    document.getElementById('btn-bet').disabled = false;
    refreshBalance();
  } catch (e) {
    console.error('Wallet connect error:', e);
  }
}

async function refreshBalance() {
  if (!walletAddress || !window.ethereum) return;
  try {
    const bal = await window.ethereum.request({
      method: 'eth_getBalance', params: [walletAddress, 'latest']
    });
    const bnb = parseInt(bal, 16) / 1e18;
    document.getElementById('wallet-bnb').textContent = bnb.toFixed(4);
  } catch (e) {}
}

function toggleAutoBet() {
  autoBetEnabled = !autoBetEnabled;
  const btn = document.getElementById('btn-bet');
  if (autoBetEnabled) {
    btn.textContent = '🟢 自动下注中';
    btn.classList.add('ready');
    showBetStatus('countdown', '⏳ 等待信号，将在锁定前' + BET_BEFORE_LOCK + '秒自动下注');
    startBetCountdown();
  } else {
    btn.textContent = '🎯 自动下注';
    btn.classList.remove('ready');
    hideBetStatus();
    if (betCountdownTimer) clearInterval(betCountdownTimer);
  }
}

function showBetStatus(type, msg) {
  const el = document.getElementById('bet-status');
  el.className = 'bet-status show ' + type;
  el.textContent = msg;
}

function hideBetStatus() {
  document.getElementById('bet-status').className = 'bet-status';
}

function startBetCountdown() {
  if (betCountdownTimer) clearInterval(betCountdownTimer);
  betCountdownTimer = setInterval(() => {
    if (!autoBetEnabled) return;
    const data = window._signalData;
    if (!data || !data.lock_ts || !data.current) return;

    const now = Math.floor(Date.now() / 1000);
    const serverDrift = now - (data.current_ts || now);
    const lockTs = data.lock_ts;
    const secondsLeft = lockTs - now + serverDrift;

    if (secondsLeft <= BET_BEFORE_LOCK && secondsLeft > 0 && lastBetEpoch !== data.current.epoch) {
      executeBet(data.current);
    } else if (secondsLeft > BET_BEFORE_LOCK) {
      showBetStatus('countdown',
        '⏳ 距锁定 ' + Math.floor(secondsLeft / 60) + 'm ' + (secondsLeft % 60) + 's | 信号: ' +
        (data.current.direction || 'SKIP') + ' 信心:' + Math.round(data.current.confidence || 0));
    }
    refreshBalance();
  }, 1000);
}

async function executeBet(signal) {
  if (!walletAddress || !window.ethereum) return;
  if (!signal.direction || signal.direction === 'SKIP') {
    showBetStatus('error', '⚠️ 本期信号 SKIP，跳过下注');
    return;
  }
  const epoch = signal.epoch;
  if (lastBetEpoch === epoch) return;
  lastBetEpoch = epoch;

  const betAmount = '0.005'; // default 0.005 BNB
  const valueHex = '0x' + (BigInt(Math.floor(parseFloat(betAmount) * 1e18))).toString(16);

  try {
    showBetStatus('betting', '🦊 请在 MetaMask 确认下注... E' + epoch + ' ' + signal.direction);
    const methodSig = signal.direction === 'BULL' ? 'betBull(uint256)' : 'betBear(uint256)';
    const epochHex = '0x' + BigInt(epoch).toString(16);
    // Encode function call: selector(4 bytes) + padded uint256
    const fnHash = getSelector(methodSig);
    const data = fnHash + epochHex.slice(2).padStart(64, '0');

    const txHash = await window.ethereum.request({
      method: 'eth_sendTransaction',
      params: [{
        from: walletAddress,
        to: PREDICTION_ADDR,
        value: valueHex,
        data: data,
      }]
    });
    showBetStatus('success', '✅ 下注成功! E' + epoch + ' ' + signal.direction + ' | tx: ' + txHash.slice(0, 10) + '...');
  } catch (e) {
    const msg = e.message || String(e);
    if (msg.includes('User denied') || msg.includes('user rejected')) {
      showBetStatus('error', '❌ 用户取消了交易');
    } else {
      showBetStatus('error', '❌ 下注失败: ' + msg.slice(0, 80));
    }
    lastBetEpoch = 0; // allow retry
  }
}

// Pre-computed keccak256 function selectors for PancakeSwap V2 Prediction
function getSelector(method) {
  const selectors = {
    'betBull(uint256)': 'e8e39d94',
    'betBear(uint256)': '6d6c9860',
  };
  return '0x' + (selectors[method] || '00000000');
}
